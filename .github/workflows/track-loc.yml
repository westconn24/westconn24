name: Track Daily LOC from PRs

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      days_back:
        description: 'How many days back to process (default: 1 = yesterday)'
        required: false
        default: '1'

jobs:
  track-loc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Track LOC from merged PRs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DAYS_BACK: ${{ github.event.inputs.days_back || (hashFiles('loc-log.json') == '' && '30' || '1') }}
        run: python scripts/track_loc.py

      - name: Commit log update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add loc-log.json
          git diff --staged --quiet || git commit -m "LOC update: $(date -u '+%Y-%m-%d') (${DAYS_BACK:-1}d)"
          git pull --rebase origin main
          git push

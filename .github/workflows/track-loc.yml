name: Track Daily LOC from PRs

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:

jobs:
  track-loc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Track LOC from merged PRs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/track_loc.py

      - name: Commit log update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add loc-log.json
          git diff --staged --quiet || git commit -m "LOC update: $(date -u '+%Y-%m-%d')"
          git push
